# General Runtime Error
runtime-exception=An unexpected error occurred while operating with the entity.
concurrency-error=Concurrency conflict during the operation.
login-successful=Login successful.
unhandled-exception=Unhandled exception;

# Database Response Messages
data.invalid-data=The data is not valid.
data.identical-data=The provided data is identical to the existing data.
database.existing-data=A record with similar data already exists in the database.
database.entity-not-found=Entity not found with the provided id.
database.data-integrity-violation=Data integrity violation detected. Please review the integrity, a foreign key constraint has failed.
database.query-timeout=The query exceeded the allowable execution time.
database.connection-error=Failed to connect to the database. Please try again later.
database.lock-conflict=A database lock conflict occurred during the operation.
database.create-failed=The resource could not be created.
database.delete-failed=The resource could not be deleted.
database.update-failed=The resource could not be updated.
database.syntax-error=There was a syntax error in the SQL statement.
database.access-error=The database is inaccessible.
database.no-such=The provided id is not found.

# HTTP Response Messages

## 2xx Success
http.success.ok=The request was successfully processed.
http.success.created=The resource has been created successfully.
http.success.accepted=The request has been accepted for processing, but the operation is not completed yet.
http.success.no-content=The request was successful, but there is no content to return.
http.success.partial-content=The response contains only partial content as requested.

## 3xx Redirection
http.redirect.multiple-choices=The request has multiple possible responses.
http.redirect.moved-permanently=The resource has been permanently moved to a new location.
http.redirect.found=The resource has been temporarily moved.
http.redirect.not-modified=The resource has not been modified since the last request.
http.redirect.temporary-redirect=The requested resource is temporarily at a different location.
http.redirect.permanent-redirect=The resource has been permanently redirected to a new location.

## 4xx Client Errors
http.client.bad-request=The request is invalid. Please check the data provided.
http.client.unauthorized=Authorization is required to access this resource.
http.client.forbidden=Access to the requested resource is denied.
http.client.not-found=The resource was not found.
http.client.method-not-allowed=The HTTP method used is not allowed for this endpoint.
http.client.conflict=There was a conflict while processing the request.
http.client.unsupported-media-type=The provided media type is unsupported.
http.client.too-many-requests=Too many requests have been made. Please wait and try again.

## 5xx Server Errors
http.server.internal-server=An unexpected error occurred on the server.
http.server.service-unavailable=The service is temporarily unavailable. Please try again later.
http.server.gateway-timeout=The server took too long to respond.
http.server.not-implemented=The requested operation is not implemented on this server.
http.server.bad-gateway=An issue occurred while communicating with an upstream service.
http.server.io-exception=An I/O error occurred during the operation.
