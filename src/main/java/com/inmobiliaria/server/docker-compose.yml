version: '3.8'
services:
  mysql:
    image: mysql:latest
    container_name: my-mysql-docker
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: base_inmobiliaria
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: